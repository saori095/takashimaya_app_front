<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgSasaki" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <radialGradient id="faceSasaki" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#fff3e3"/>
      <stop offset="100%" stop-color="#f4d3a8"/>
    </radialGradient>
    <linearGradient id="hairSasaki" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2a1a0e"/>
      <stop offset="100%" stop-color="#180e07"/>
    </linearGradient>
    <linearGradient id="uniformSasaki" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c1810"/>
      <stop offset="100%" stop-color="#1a0e07"/>
    </linearGradient>
    <linearGradient id="scarfSasaki" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#7c1d24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgSasaki)"/>

  <!-- Soft circles decoration -->
  <g fill="#fff" opacity="0.5">
    <circle cx="55" cy="80" r="50" opacity="0.3"/>
    <circle cx="350" cy="320" r="60" opacity="0.25"/>
  </g>

  <!-- Hair back (shoulder-length bob) -->
  <path d="M 110 175 Q 95 250 110 320 L 290 320 Q 305 250 290 175 Q 295 95 200 88 Q 105 95 110 175 Z" fill="url(#hairSasaki)"/>

  <!-- Department store uniform -->
  <path d="M 60 380 L 130 320 L 145 305 Q 200 350 255 305 L 270 320 L 340 380 Z" fill="url(#uniformSasaki)"/>
  <path d="M 145 305 L 175 380 L 200 350 L 145 305 Z" fill="#0a0604"/>
  <path d="M 255 305 L 225 380 L 200 350 L 255 305 Z" fill="#0a0604"/>

  <!-- Inner blouse -->
  <path d="M 175 320 Q 200 345 225 320 L 220 380 L 180 380 Z" fill="#fafafa"/>

  <!-- Takashimaya signature scarf -->
  <path d="M 180 330 Q 200 340 220 330 Q 215 350 200 350 Q 185 350 180 330 Z" fill="url(#scarfSasaki)"/>
  <path d="M 192 340 L 195 365 L 198 340" stroke="#7c1d24" stroke-width="0.5" fill="none"/>

  <!-- Neck -->
  <path d="M 178 285 Q 200 305 222 285 L 222 318 Q 200 328 178 318 Z" fill="url(#faceSasaki)"/>
  <path d="M 178 290 Q 200 305 222 290" stroke="#d8a26b" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Face oval (slightly rounder, motherly warmth) -->
  <ellipse cx="200" cy="218" rx="80" ry="98" fill="url(#faceSasaki)"/>

  <!-- Hair front - center-parted, soft sweep (mature professional) -->
  <path d="M 122 175 Q 130 145 155 130 Q 180 122 200 130 Q 195 150 188 165 Q 170 170 150 168 Q 135 170 122 175 Z" fill="url(#hairSasaki)"/>
  <path d="M 200 130 Q 220 122 245 130 Q 270 145 278 175 Q 265 170 250 168 Q 230 170 212 165 Q 205 150 200 130 Z" fill="url(#hairSasaki)"/>

  <!-- Hair sides ending at shoulder -->
  <path d="M 122 170 Q 110 230 115 305 Q 100 250 110 175 Z" fill="url(#hairSasaki)"/>
  <path d="M 278 170 Q 290 230 285 305 Q 300 250 290 175 Z" fill="url(#hairSasaki)"/>

  <!-- Hair highlight -->
  <path d="M 145 145 Q 170 130 195 138 Q 175 142 160 150 Q 150 150 145 145 Z" fill="#5d3a25" opacity="0.4"/>

  <!-- Hair clip / barrette (subtle elegance) -->
  <rect x="145" y="135" width="22" height="6" rx="3" fill="#9f1239" opacity="0.85"/>
  <rect x="148" y="137" width="2" height="2" fill="#fff" opacity="0.6"/>

  <!-- Ears -->
  <ellipse cx="121" cy="225" rx="7" ry="12" fill="url(#faceSasaki)"/>
  <ellipse cx="279" cy="225" rx="7" ry="12" fill="url(#faceSasaki)"/>
  <!-- Pearl earrings -->
  <circle cx="121" cy="238" r="3.5" fill="#fff" stroke="#d4d4d4" stroke-width="0.4"/>
  <circle cx="279" cy="238" r="3.5" fill="#fff" stroke="#d4d4d4" stroke-width="0.4"/>
  <circle cx="120.5" cy="237" r="1" fill="#fff" opacity="0.9"/>
  <circle cx="278.5" cy="237" r="1" fill="#fff" opacity="0.9"/>

  <!-- Eyebrows (gentle, kindly arched) -->
  <path d="M 156 198 Q 173 192 192 196" stroke="#2a1a0e" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <path d="M 208 196 Q 227 192 244 198" stroke="#2a1a0e" stroke-width="2.6" fill="none" stroke-linecap="round"/>

  <!-- Eyes (warm, slightly crinkled smile) -->
  <path d="M 154 224 Q 172 218 190 224 Q 172 232 154 224 Z" fill="#fff"/>
  <ellipse cx="172" cy="225" rx="7.5" ry="8" fill="#3a2418"/>
  <circle cx="172" cy="224" r="5" fill="#1a0d05"/>
  <circle cx="174" cy="222" r="2" fill="#fff"/>
  <circle cx="170" cy="227" r="0.7" fill="#fff"/>

  <path d="M 210 224 Q 228 218 246 224 Q 228 232 210 224 Z" fill="#fff"/>
  <ellipse cx="228" cy="225" rx="7.5" ry="8" fill="#3a2418"/>
  <circle cx="228" cy="224" r="5" fill="#1a0d05"/>
  <circle cx="230" cy="222" r="2" fill="#fff"/>
  <circle cx="226" cy="227" r="0.7" fill="#fff"/>

  <!-- Eyelashes -->
  <g stroke="#2a1a0e" stroke-width="1.4" stroke-linecap="round" fill="none">
    <line x1="156" y1="219" x2="153" y2="215"/>
    <line x1="164" y1="216" x2="162" y2="211"/>
    <line x1="172" y1="215" x2="172" y2="210"/>
    <line x1="181" y1="216" x2="183" y2="211"/>
    <line x1="187" y1="219" x2="190" y2="215"/>
    <line x1="212" y1="219" x2="209" y2="215"/>
    <line x1="220" y1="216" x2="218" y2="211"/>
    <line x1="228" y1="215" x2="228" y2="210"/>
    <line x1="237" y1="216" x2="239" y2="211"/>
    <line x1="243" y1="219" x2="246" y2="215"/>
  </g>

  <!-- Nose -->
  <path d="M 200 234 Q 199 252 195 258 Q 199 260 204 258" stroke="#c89a6f" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Cheeks (warmer blush) -->
  <ellipse cx="153" cy="254" rx="14" ry="8" fill="#fda4af" opacity="0.4"/>
  <ellipse cx="247" cy="254" rx="14" ry="8" fill="#fda4af" opacity="0.4"/>

  <!-- Lips (warmer smile) -->
  <path d="M 184 277 Q 200 271 216 277 Q 213 285 200 285 Q 187 285 184 277 Z" fill="#be1f44"/>
  <path d="M 188 276 Q 200 270 212 276" stroke="#9f1239" stroke-width="0.6" fill="none"/>
  <path d="M 192 281 Q 200 283 208 281" stroke="#fff" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Slight smile lines (gentle) -->
  <path d="M 178 273 Q 175 277 178 280" stroke="#c89a6f" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M 222 273 Q 225 277 222 280" stroke="#c89a6f" stroke-width="0.6" fill="none" opacity="0.5"/>
</svg>
