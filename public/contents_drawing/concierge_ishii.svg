<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgIshii" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3f2"/>
      <stop offset="100%" stop-color="#fce7e8"/>
    </linearGradient>
    <radialGradient id="faceIshii" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#fff3e3"/>
      <stop offset="100%" stop-color="#f4d3a8"/>
    </radialGradient>
    <linearGradient id="hairIshii" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0d0905"/>
    </linearGradient>
    <linearGradient id="uniformIshii" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c1810"/>
      <stop offset="100%" stop-color="#1a0e07"/>
    </linearGradient>
    <linearGradient id="scarfIshii" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#7c1d24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgIshii)"/>

  <!-- Soft circles decoration -->
  <g fill="#fff" opacity="0.5">
    <circle cx="55" cy="80" r="50" opacity="0.3"/>
    <circle cx="350" cy="320" r="60" opacity="0.25"/>
  </g>

  <!-- Hair back layer (long straight black) -->
  <path d="M 110 175 Q 95 280 115 380 L 285 380 Q 305 280 290 175 Q 295 95 200 88 Q 105 95 110 175 Z" fill="url(#hairIshii)"/>

  <!-- Department store uniform (dark navy/black blazer) -->
  <path d="M 60 380 L 130 320 L 145 305 Q 200 350 255 305 L 270 320 L 340 380 Z" fill="url(#uniformIshii)"/>
  <!-- Lapels -->
  <path d="M 145 305 L 175 380 L 200 350 L 145 305 Z" fill="#0a0604"/>
  <path d="M 255 305 L 225 380 L 200 350 L 255 305 Z" fill="#0a0604"/>

  <!-- Inner blouse (white) -->
  <path d="M 175 320 Q 200 345 225 320 L 220 380 L 180 380 Z" fill="#fafafa"/>

  <!-- Takashimaya signature scarf (rose) - subtle accent -->
  <path d="M 180 330 Q 200 340 220 330 Q 215 350 200 350 Q 185 350 180 330 Z" fill="url(#scarfIshii)"/>
  <path d="M 192 340 L 195 365 L 198 340" stroke="#7c1d24" stroke-width="0.5" fill="none"/>

  <!-- Neck -->
  <path d="M 178 285 Q 200 305 222 285 L 222 318 Q 200 328 178 318 Z" fill="url(#faceIshii)"/>
  <path d="M 178 290 Q 200 305 222 290" stroke="#d8a26b" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Face oval (slightly elongated, refined) -->
  <ellipse cx="200" cy="215" rx="78" ry="98" fill="url(#faceIshii)"/>

  <!-- Hair front - sleek straight bangs with side parting -->
  <path d="M 124 175 Q 135 130 155 115 Q 178 105 200 110 Q 195 145 188 162 Q 175 170 160 168 Q 140 170 124 175 Z" fill="url(#hairIshii)"/>
  <path d="M 200 110 Q 235 108 262 130 Q 280 152 278 178 Q 268 168 245 165 Q 220 162 205 145 Q 200 125 200 110 Z" fill="url(#hairIshii)"/>

  <!-- Hair side fall -->
  <path d="M 122 170 Q 110 230 117 290 Q 100 245 110 175 Z" fill="url(#hairIshii)"/>
  <path d="M 278 170 Q 290 230 283 290 Q 300 245 290 175 Z" fill="url(#hairIshii)"/>

  <!-- Hair shine highlight -->
  <path d="M 145 145 Q 165 125 185 130 Q 175 135 165 145 Q 155 150 145 145 Z" fill="#5d3a25" opacity="0.4"/>
  <path d="M 240 145 Q 260 145 270 165 Q 258 152 248 148 Q 242 147 240 145 Z" fill="#5d3a25" opacity="0.4"/>

  <!-- Ears -->
  <ellipse cx="121" cy="225" rx="7" ry="12" fill="url(#faceIshii)"/>
  <ellipse cx="279" cy="225" rx="7" ry="12" fill="url(#faceIshii)"/>
  <!-- Pearl earrings -->
  <circle cx="121" cy="238" r="3.5" fill="#fff" stroke="#d4d4d4" stroke-width="0.4"/>
  <circle cx="279" cy="238" r="3.5" fill="#fff" stroke="#d4d4d4" stroke-width="0.4"/>
  <circle cx="120.5" cy="237" r="1" fill="#fff" opacity="0.9"/>
  <circle cx="278.5" cy="237" r="1" fill="#fff" opacity="0.9"/>

  <!-- Eyebrows (refined, slightly arched) -->
  <path d="M 156 196 Q 173 188 192 192" stroke="#1a1208" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M 208 192 Q 227 188 244 196" stroke="#1a1208" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Eyes (almond, refined) -->
  <path d="M 154 222 Q 172 215 190 222 Q 172 230 154 222 Z" fill="#fff"/>
  <ellipse cx="172" cy="223" rx="7.5" ry="8.5" fill="#3a2418"/>
  <circle cx="172" cy="222" r="5" fill="#1a0d05"/>
  <circle cx="174" cy="220" r="2" fill="#fff"/>
  <circle cx="170" cy="225" r="0.7" fill="#fff"/>

  <path d="M 210 222 Q 228 215 246 222 Q 228 230 210 222 Z" fill="#fff"/>
  <ellipse cx="228" cy="223" rx="7.5" ry="8.5" fill="#3a2418"/>
  <circle cx="228" cy="222" r="5" fill="#1a0d05"/>
  <circle cx="230" cy="220" r="2" fill="#fff"/>
  <circle cx="226" cy="225" r="0.7" fill="#fff"/>

  <!-- Eyelashes -->
  <g stroke="#1a1208" stroke-width="1.5" stroke-linecap="round" fill="none">
    <line x1="156" y1="217" x2="153" y2="213"/>
    <line x1="163" y1="214" x2="161" y2="209"/>
    <line x1="170" y1="213" x2="170" y2="208"/>
    <line x1="180" y1="214" x2="182" y2="209"/>
    <line x1="187" y1="217" x2="190" y2="213"/>
    <line x1="212" y1="217" x2="209" y2="213"/>
    <line x1="219" y1="214" x2="217" y2="209"/>
    <line x1="226" y1="213" x2="226" y2="208"/>
    <line x1="236" y1="214" x2="238" y2="209"/>
    <line x1="243" y1="217" x2="246" y2="213"/>
  </g>

  <!-- Nose -->
  <path d="M 200 232 Q 199 250 195 256 Q 199 258 204 256" stroke="#c89a6f" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Cheeks (subtle blush) -->
  <ellipse cx="153" cy="252" rx="14" ry="7" fill="#fda4af" opacity="0.35"/>
  <ellipse cx="247" cy="252" rx="14" ry="7" fill="#fda4af" opacity="0.35"/>

  <!-- Lips (refined, slight smile) -->
  <path d="M 187 274 Q 200 270 213 274 Q 210 280 200 280 Q 190 280 187 274 Z" fill="#be1f44"/>
  <path d="M 190 273 Q 200 268 210 273" stroke="#9f1239" stroke-width="0.6" fill="none"/>
  <path d="M 195 277 Q 200 278 205 277" stroke="#fff" stroke-width="0.5" fill="none" opacity="0.5"/>
</svg>
